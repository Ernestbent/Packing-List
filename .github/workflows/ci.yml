name: CI
on:
  push:
    branches:
      - develop
  pull_request:
concurrency:
  group: develop-autozonepro-${{ github.event.number }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server
    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping -h localhost -proot" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      - name: Clone
        uses: actions/checkout@v4

      ## Python 3.10 for Frappe v15 compatibility
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      ## Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      ## Cache yarn dependencies
      - name: Get yarn cache directory
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn
        uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      ## Install system dependencies
      - name: Install MariaDB Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      ## Initialize bench environment
      - name: Setup bench environment
        run: |
          pip install --upgrade pip setuptools wheel
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      ## Configure MariaDB charset
      - name: Configure database
        run: |
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      ## Clone Frappe and patch syntax error before pip install
      - name: Install Frappe with patch
        working-directory: /home/runner/frappe-bench
        env:
          CI: 'Yes'
        run: |
          ## Clone latest Frappe v15
          bench get-app frappe --branch version-15
          
          ## Remove Python 3.12+ type annotation syntax that breaks Python 3.10
          sed -i '/^type ConfType/,/^$/d' apps/frappe/frappe/__init__.py
          
          ## Verify the line was removed
          echo "Patched frappe/__init__.py"
          grep -n "ConfType" apps/frappe/frappe/__init__.py || echo "Patch successful - ConfType removed"

      ## Install autozonepro app and dependencies
      - name: Install autozonepro app
        working-directory: /home/runner/frappe-bench
        env:
          CI: 'Yes'
        run: |
          bench get-app autozonepro $GITHUB_WORKSPACE
          bench setup requirements --dev

      ## Create test site and install apps
      - name: Create and setup test site
        working-directory: /home/runner/frappe-bench
        run: |
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app frappe
          bench --site test_site install-app autozonepro
          bench --site test_site migrate

      ## Build assets
      - name: Build assets
        working-directory: /home/runner/frappe-bench
        run: |
          bench build

      ## Run tests
      - name: Run tests
        working-directory: /home/runner/frappe-bench
        env:
          TYPE: server
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app autozonepro --verbose