## Works - no Transit warehouse deletion
name: CI
on:
  push:
    branches:
      - develop
  pull_request:
concurrency:
  group: develop-autozonepro-${{ github.event.number }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server
    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping -h localhost -proot" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Get yarn cache directory
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn
        uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client redis-server git curl

      - name: Setup bench environment
        run: |
          pip install --upgrade pip setuptools wheel
          pip install frappe-bench
          bench init --frappe-branch version-15 --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      - name: Configure database
        run: |
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install ERPNext and autozonepro apps
        working-directory: /home/runner/frappe-bench
        env:
          CI: 'Yes'
        run: |
          source env/bin/activate
          echo "Installing ERPNext..."
          bench get-app --branch version-15 erpnext
          echo "Installing autozonepro..."
          bench get-app autozonepro $GITHUB_WORKSPACE
          bench setup requirements --dev
          echo "Apps installed successfully"

      - name: Create test site and install apps
        working-directory: /home/runner/frappe-bench
        run: |
          source env/bin/activate
          
          ## Create site
          echo "Creating test site..."
          bench new-site --db-root-password root --admin-password admin test_site
          
          ## Install ERPNext (creates Transit warehouse type automatically)
          echo "Installing ERPNext..."
          bench --site test_site install-app erpnext
          
          ## Install autozonepro app
          echo "Installing autozonepro..."
          bench --site test_site install-app autozonepro
          
          ## Run migrations
          echo "Running migrations..."
          bench --site test_site migrate
          
          echo "Site setup completed successfully"

      - name: Build assets
        working-directory: /home/runner/frappe-bench
        run: |
          source env/bin/activate
          bench build

      - name: Run tests
        working-directory: /home/runner/frappe-bench
        env:
          TYPE: server
        run: |
          source env/bin/activate
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app autozonepro --skip-test-records
