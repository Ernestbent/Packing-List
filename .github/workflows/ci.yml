name: CI
on:
  push:
    branches:
      - develop
  pull_request:
concurrency:
  group: develop-autozonepro-${{ github.event.number }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server
    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping -h localhost -proot" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      - name: Clone
        uses: actions/checkout@v4

      ## Python 3.10 for Frappe v15 compatibility
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      ## Install system dependencies
      - name: Install MariaDB Client and other dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client redis-server git curl

      ## Initialize bench environment with specific Frappe version
      - name: Setup bench environment
        run: |
          pip install --upgrade pip
          pip install frappe-bench
          
          # Initialize bench with Frappe branch v15
          bench init --frappe-branch version-15 --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      ## Configure MariaDB charset
      - name: Configure database
        run: |
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      ## Install autozonepro app and dependencies
      - name: Install autozonepro app
        working-directory: /home/runner/frappe-bench
        env:
          CI: 'Yes'
        run: |
          # Get the app from the current repository
          bench get-app autozonepro $GITHUB_WORKSPACE
          bench setup requirements --dev

      ## Create test site and install apps
      - name: Create and setup test site
        working-directory: /home/runner/frappe-bench
        run: |
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app autozonepro

      ## Build assets
      - name: Build assets
        working-directory: /home/runner/frappe-bench
        run: |
          bench build

      ## Run tests
      - name: Run tests
        working-directory: /home/runner/frappe-bench
        env:
          TYPE: server
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app autozonepro --verbose